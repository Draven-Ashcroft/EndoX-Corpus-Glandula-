<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Corpus Glandula — Class 10 (CBSE)</title>
<style>
  :root{--bg:#0d1420;--panel:#141d2b;--panel2:#1b2636;--line:#26344a;--ink:#e7edf5;--muted:#93a3ba;--accent:#5cc8d6;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:-apple-system,"Segoe UI",Roboto,system-ui,Arial,sans-serif;overflow:hidden;}
  #app{display:flex;height:100vh;width:100vw;}
  #panel{width:250px;flex:0 0 250px;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0;}
  #panel h1{font-size:15px;margin:0;padding:16px 16px 4px;letter-spacing:.3px;}
  #panel .sub{font-size:11px;color:var(--muted);padding:0 16px 12px;line-height:1.5;}
  .titleRow{display:flex;align-items:center;gap:10px;padding:16px 16px 4px;}
  .titleMark{width:28px;height:28px;flex:0 0 auto;border-radius:9px;background:linear-gradient(135deg,var(--accent),#2f7d8f);box-shadow:0 0 14px rgba(92,200,214,.55);display:flex;align-items:center;justify-content:center;}
  .titleMark svg{width:17px;height:17px;}
  .titleRow h1{margin:0;font-size:19px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink);text-shadow:0 0 10px rgba(92,200,214,.55),0 0 22px rgba(92,200,214,.25);}
  .block{padding:10px 16px;border-top:1px solid var(--line);}
  .lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px;}
  .sexRow{display:flex;gap:10px;}
  .sexbtn{width:46px;height:46px;border-radius:50%;border:1.5px solid var(--line);background:var(--panel2);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;}
  .sexbtn svg{width:22px;height:22px;}
  .sexbtn:hover{border-color:var(--accent);}
  .sexbtn.on{background:var(--accent);border-color:var(--accent);color:#062028;}
  .sexbtn.on.f{background:#e59bc0;border-color:#e59bc0;color:#3a0f26;}
  .row{display:flex;gap:8px;margin-top:8px;}
  .btn{flex:1;border:1px solid var(--line);background:var(--panel2);color:var(--ink);padding:9px 0;border-radius:8px;font-size:12px;cursor:pointer;transition:.15s;}
  .btn:hover{border-color:var(--accent);}
  .btn{display:flex;align-items:center;justify-content:center;gap:6px;}
  .bicon{width:15px;height:15px;flex:0 0 auto;}
  .btn.active{border-color:var(--accent);color:var(--accent);}
  #list{flex:1 1 auto;overflow-y:auto;padding:6px 8px 20px;min-height:0;}
  .item{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:8px;cursor:pointer;transition:.12s;}
  .item:hover{background:var(--panel2);}
  .item.sel{background:var(--panel2);outline:1px solid var(--accent);}
  .dot{width:13px;height:13px;border-radius:50%;flex:0 0 13px;box-shadow:inset 0 0 3px rgba(0,0,0,.5);}
  .item span{font-size:12.5px;line-height:1.25;}
  #stage{flex:1 1 auto;position:relative;min-width:0;}
  #view{display:block;width:100%;height:100%;touch-action:none;cursor:grab;}
  #view:active{cursor:grabbing;}
  #hint{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);background:rgba(10,16,26,.72);border:1px solid var(--line);color:var(--muted);font-size:11px;padding:7px 14px;border-radius:20px;pointer-events:none;white-space:nowrap;}
  #tip{position:absolute;pointer-events:none;background:rgba(10,16,26,.9);border:1px solid var(--accent);color:var(--ink);font-size:12px;padding:4px 9px;border-radius:6px;display:none;transform:translate(-50%,-140%);white-space:nowrap;}
  #orgCard{position:absolute;left:50%;top:18%;transform:translate(-50%,-10px);width:min(78%,300px);background:rgba(12,18,28,.97);border:1px solid var(--accent);border-radius:14px;padding:14px 16px;box-shadow:0 12px 34px rgba(0,0,0,.5);pointer-events:none;opacity:0;transition:opacity .25s ease,transform .25s ease;z-index:15;}
  #orgCard.show{opacity:1;transform:translate(-50%,0);}
  #orgCard .ocTitle{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:8px;}
  #orgCard .ocSection{font-size:9.5px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:8px 0 4px;}
  #orgCard .ocList{font-size:12.5px;line-height:1.7;color:var(--ink);}
  #orgCard .ocExtra{color:var(--muted);}
  #orgCard .ocNote{font-size:10px;color:var(--muted);margin-top:8px;line-height:1.5;font-style:italic;}

  @media (max-width:720px){
    #app{flex-direction:column;}
    #panel{width:100%;flex:0 0 auto;flex-direction:column;border-right:0;border-bottom:1px solid var(--line);max-height:44vh;}
    #list{max-height:20vh;}
    #card{flex-direction:column;max-height:92%;}
    #zc{flex:0 0 auto;} #zcv{height:220px;}
  }

  .demo .k{margin-bottom:8px;}
  #sugCap{font-size:13px;line-height:1.5;min-height:38px;}
  #sugBarWrap{position:relative;height:16px;background:#0f1622;border-radius:8px;overflow:hidden;margin:8px 0 4px;}
  #sugFill{height:100%;width:32%;background:#5fce8f;border-radius:8px;transition:width 1.1s ease,background 1.1s ease;}
  #sugMark{position:absolute;top:-2px;bottom:-2px;left:33%;width:2px;background:#93a3ba;opacity:.6;}
  #sugVal{font-size:11px;color:#5fce8f;font-weight:600;margin-bottom:10px;}

  html,body{height:100%;}
  body{display:flex;flex-direction:column;overflow:hidden;}
  #tabbar{display:flex;gap:3px;padding:6px 8px 0;background:#080d14;overflow-x:auto;flex:0 0 auto;align-items:flex-end;}
  .tab{display:flex;align-items:center;gap:8px;background:#141d2b;color:#93a3ba;padding:9px 13px;border-radius:9px 9px 0 0;font-size:12.5px;cursor:pointer;white-space:nowrap;border:1px solid #26344a;border-bottom:none;max-width:210px;flex:0 0 auto;}
  .tab.active{background:#0d1420;color:#e7edf5;}
  .tab .tlbl{overflow:hidden;text-overflow:ellipsis;}
  .tab .tclose{opacity:.55;font-size:16px;line-height:1;}
  .tab .tclose:hover{opacity:1;color:#e6795a;}
  #tabviews{flex:1 1 auto;position:relative;min-height:0;background:#0d1420;}
  #view-home{position:absolute;inset:0;display:none;}
  #view-home.active{display:block;}
  #app{height:100%!important;width:100%!important;}
  #panels{position:absolute;inset:0;pointer-events:none;}
  .panel{position:absolute;inset:0;display:none;overflow:auto;padding:18px;gap:20px;pointer-events:auto;
    scrollbar-width:thin;scrollbar-color:var(--accent) rgba(255,255,255,.06);}
  .panel::-webkit-scrollbar{width:9px;}
  .panel::-webkit-scrollbar-track{background:rgba(255,255,255,.05);border-radius:5px;}
  .panel::-webkit-scrollbar-thumb{background:var(--accent);border-radius:5px;}
  .scrollhint{position:sticky;bottom:0;left:0;flex:0 0 100%;height:36px;margin-top:6px;
    background:linear-gradient(to bottom, rgba(13,20,32,0), rgba(13,20,32,.96) 60%);
    display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;
    pointer-events:none;transition:opacity .25s ease;opacity:1;}
  .scrollhint.hide{opacity:0;}
  .scrollhint svg{width:17px;height:17px;color:var(--accent);animation:scrollBounce 1.4s ease-in-out infinite;}
  @keyframes scrollBounce{0%,100%{transform:translateY(0);opacity:.5;}50%{transform:translateY(5px);opacity:1;}}
  .panel.active{display:flex;flex-wrap:wrap;align-content:flex-start;}
  .pcol{flex:1 1 330px;min-width:270px;}
  .imgwrap{position:relative;background:#0a1018;border:1px solid #26344a;border-radius:14px;height:min(52vh,430px);display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .imgwrap img{width:100%;height:100%;object-fit:contain;}
  .subimg{position:relative;background:#0a1018;border:1px solid #26344a;border-radius:10px;height:140px;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-top:10px;}
  .subimg img{width:100%;height:100%;object-fit:contain;}
  .subimg canvas.overlay{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
  .subimgph{color:#93a3ba;font-size:11.5px;text-align:center;line-height:1.6;padding:0 16px;}
  .glandcv{width:100%;height:100%;display:block;}
  .phnote,.imgph{position:absolute;bottom:0;left:0;right:0;padding:10px 12px;background:rgba(8,13,20,.85);color:#93a3ba;font-size:11px;text-align:center;line-height:1.5;}
  .phnote code,.pv code{color:#5cc8d6;font-size:11px;}
  .pright h2{margin:0 0 8px;font-size:22px;}
  .hpill{display:inline-block;background:#13303a;color:#5cc8d6;font-size:12px;font-weight:700;padding:6px 12px;border-radius:20px;margin-bottom:14px;}
  .pfield{margin-bottom:14px;}.pk{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#93a3ba;margin-bottom:4px;}.pv{font-size:14px;line-height:1.55;}
  .lab{margin-top:8px;padding:16px;border:1px solid #26344a;border-radius:12px;background:#141d2b;}
  .labtitle{font-size:11px;font-weight:700;color:#5cc8d6;text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px;}
  .ctl{margin-bottom:14px;}.ctl label{display:block;font-size:12px;color:#93a3ba;margin-bottom:7px;}
  .ctl input[type=range]{width:100%;accent-color:#5cc8d6;}
  .labbtn{background:#5cc8d6;color:#062028;border:0;border-radius:9px;padding:10px 15px;font-weight:700;font-size:13px;cursor:pointer;margin-bottom:14px;}
  .lblRow{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .lblRow .lbl{margin-bottom:0;}
  .saveBtn{width:26px;height:26px;flex:0 0 auto;border-radius:50%;border:1px solid var(--line);background:var(--panel2);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;}
  .saveBtn:hover{border-color:var(--accent);color:var(--accent);}
  .saveBtn svg{width:13px;height:13px;}
  .gauge{margin:12px 0;}.glabel{font-size:11px;color:#93a3ba;margin-bottom:6px;}
  .gbarwrap{height:16px;background:#0f1622;border-radius:8px;overflow:hidden;}
  .gbar{height:100%;width:40%;background:#5fce8f;border-radius:8px;transition:width .1s linear,background .2s;}
  .gval{font-size:12px;font-weight:600;margin-top:6px;}
  .spark{width:100%;height:92px;display:block;margin-top:10px;background:#0f1622;border-radius:8px;}
  .devcv{width:100%;height:170px;display:block;margin-top:10px;background:#0f1622;border-radius:8px;}
  .devnav{display:flex;align-items:center;gap:8px;margin-top:10px;}
  .devarrow{width:34px;height:34px;flex:0 0 auto;border-radius:50%;border:1px solid var(--line);background:var(--panel2);color:var(--ink);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;}
  .devarrow:hover{border-color:var(--accent);}
  .devarrow:disabled{opacity:.3;cursor:default;border-color:var(--line);}
  .devarrow svg{width:15px;height:15px;}
  #devCard{flex:1;text-align:center;padding:0 4px;min-width:0;}
  .devstage-name{font-weight:700;font-size:12.5px;color:#e7edf5;}
  .devage{color:#93a3ba;font-weight:500;font-size:11.5px;}
  .devnote{font-size:11.5px;color:#93a3ba;margin-top:4px;line-height:1.5;}
  @keyframes devFadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
  .devfade{animation:devFadeIn .35s ease;}
  .ovcv{width:100%;height:150px;display:block;margin-top:10px;background:#0f1622;border-radius:8px;}
  .labhint{font-size:12px;color:#93a3ba;line-height:1.55;margin-top:10px;}
  .seg2{display:flex;gap:6px;margin-bottom:14px;}.seg2 button{flex:1;background:#1b2636;color:#93a3ba;border:1px solid #26344a;border-radius:8px;padding:9px;font-size:13px;cursor:pointer;}.seg2 button.on{background:#5cc8d6;color:#062028;border-color:#5cc8d6;font-weight:700;}

  .fx{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2;}
  .imgwrap img,.glandcv{position:relative;z-index:1;}
  .phnote,.imgph{z-index:3;}
  .hlabel{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:#5cc8d6;margin-bottom:2px;}
  .pright .hname{margin:0 0 6px;font-size:26px;color:#e7edf5;}
  .origin{font-size:13px;color:#93a3ba;margin-bottom:18px;}
  .origin b{color:#e7edf5;}

  .figcv{width:100%;height:200px;display:block;margin-top:12px;background:#0f1622;border-radius:8px;}
  .heartcv{width:100%;height:150px;display:block;margin-top:12px;background:#0f1622;border-radius:8px;}

  .urlrow{display:flex;gap:8px;margin-top:10px;}
  .pencilRow{display:none;justify-content:flex-end;margin-top:10px;}
  .pencilRow.show{display:flex;}
  .urlPencil{width:30px;height:30px;flex:0 0 auto;border-radius:50%;border:1px solid var(--line);background:var(--panel2);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;}
  .urlPencil:hover{border-color:var(--accent);color:var(--accent);}
  .urlPencil svg{width:14px;height:14px;}
  .urlin{flex:1 1 auto;min-width:0;background:#0f1622;border:1px solid #26344a;color:#e7edf5;border-radius:8px;padding:9px 11px;font-size:12px;}
  .urlin:focus{outline:none;border-color:#5cc8d6;}
  .urlin::placeholder{color:#5b6b82;}
  .urlreset{flex:0 0 auto;background:#1b2636;border:1px solid #26344a;color:#93a3ba;border-radius:8px;padding:9px 12px;font-size:12px;cursor:pointer;}
  .urlreset:hover{border-color:#e6795a;color:#e6795a;}

  #viewRail{position:absolute;right:14px;top:50%;transform:translateY(-50%);
    display:flex;flex-direction:column;gap:8px;padding:8px;border-radius:26px;
    background:rgba(20,29,43,.42);backdrop-filter:blur(14px) saturate(160%);-webkit-backdrop-filter:blur(14px) saturate(160%);
    border:1px solid rgba(255,255,255,.14);box-shadow:0 8px 28px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.08);z-index:5;}
  .railbtn{width:42px;height:42px;border-radius:50%;border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.06);color:#c7d3e2;display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:.15s;}
  .railbtn svg{width:19px;height:19px;}
  .railbtn:hover{background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.3);color:#fff;}
  .railbtn{position:relative;overflow:hidden;}
  .railbtn.active{
    background:radial-gradient(circle at 32% 26%, rgba(255,255,255,.9), rgba(178,235,242,.55) 32%, rgba(92,200,214,.55) 62%, rgba(45,150,168,.6) 100%);
    border-color:rgba(255,255,255,.6);color:#06232b;
    box-shadow:0 0 16px rgba(92,200,214,.65), 0 0 0 1px rgba(92,200,214,.3), inset 0 -4px 7px rgba(6,35,43,.25), inset 0 2px 3px rgba(255,255,255,.5);
  }
  .railbtn.active::before{
    content:'';position:absolute;top:5px;left:7px;width:13px;height:9px;border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,.95), rgba(255,255,255,0) 72%);
    pointer-events:none;
  }
  @media (max-width:720px){
    #viewRail{right:10px;padding:7px;gap:7px;}
    .railbtn{width:38px;height:38px;}
    .railbtn svg{width:17px;height:17px;}
  }
</style>
</head>
<body>
<div id="tabbar"></div>
<div id="tabviews">
<div id="view-home" class="active"><div id="app">
  <aside id="panel">
    <div class="titleRow"><div class="titleMark"><svg viewBox="0 0 20 20" fill="none" stroke="#eafcff" stroke-width="1.5" stroke-linecap="round"><line x1="10" y1="6.2" x2="5" y2="14.2"></line><line x1="10" y1="6.2" x2="15" y2="14.2"></line><line x1="5" y1="14.2" x2="15" y2="14.2"></line><circle cx="10" cy="6.2" r="2.3" fill="#eafcff" stroke="none"></circle><circle cx="5" cy="14.2" r="1.7" fill="#eafcff" stroke="none"></circle><circle cx="15" cy="14.2" r="1.7" fill="#eafcff" stroke="none"></circle></svg></div><h1>Corpus Glandula</h1></div>
    <div class="sub">Class 10 · CBSE. Rotate the body, then tap a gland to see its hormone and what it does.</div>
    <div class="block">
      <div class="lblRow">
        <div class="lbl">Biological Sex</div>
        <button class="saveBtn" id="exportBtn" title="Export HTML with your saved images" aria-label="Export HTML with your saved images">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 3h9l4 4v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"></path><path d="M7 3v5h6V3"></path><rect x="6.3" y="11.7" width="7.4" height="4.6"></rect></svg>
        </button>
      </div>
      <div class="sexRow" id="sexSeg">
        <button data-sex="male" class="sexbtn on" aria-label="Male" title="Male">
          <svg viewBox="0 0 20 20"><circle cx="8" cy="12" r="6" fill="none" stroke="currentColor" stroke-width="1.7"></circle><line x1="12.4" y1="7.6" x2="17" y2="3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"></line><path d="M12.3 3 H17 V7.7" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"></path></svg>
        </button>
        <button data-sex="female" class="sexbtn" aria-label="Female" title="Female">
          <svg viewBox="0 0 20 20"><circle cx="10" cy="7.5" r="6" fill="none" stroke="currentColor" stroke-width="1.7"></circle><line x1="10" y1="13.5" x2="10" y2="18" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"></line><line x1="6.3" y1="16" x2="13.7" y2="16" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"></line></svg>
        </button>
      </div>
    </div>
    
    <div class="block" style="padding-bottom:4px;"><div class="lbl">Glands (tap to zoom)</div></div>
    <div id="list"></div>
  </aside>
  <main id="stage">
    <canvas id="view"></canvas>
    <div id="tip"></div>
    <div id="orgCard"></div>
    <div id="hint">Drag to rotate · scroll to zoom · click a gland</div>
    <div id="viewRail">
      <button class="railbtn active" id="spinBtn" title="Auto-rotate" aria-label="Auto-rotate">
        <svg class="bicon" viewBox="0 0 20 20">
          <g stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 3 A7 7 0 0 1 17 10"></path><path d="M17 10 l-2.3 -0.4 M17 10 l-0.9 -2.1"></path>
          </g>
          <g stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="rotate(90 10 10)">
            <path d="M10 3 A7 7 0 0 1 17 10"></path><path d="M17 10 l-2.3 -0.4 M17 10 l-0.9 -2.1"></path>
          </g>
          <g stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="rotate(180 10 10)">
            <path d="M10 3 A7 7 0 0 1 17 10"></path><path d="M17 10 l-2.3 -0.4 M17 10 l-0.9 -2.1"></path>
          </g>
          <g stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="rotate(270 10 10)">
            <path d="M10 3 A7 7 0 0 1 17 10"></path><path d="M17 10 l-2.3 -0.4 M17 10 l-0.9 -2.1"></path>
          </g>
        </svg>
      </button>
      <button class="railbtn" id="resetBtn" title="Reset view" aria-label="Reset view">
        <svg class="bicon" viewBox="0 0 20 20" fill="none" stroke="currentColor">
          <path d="M15.6 6.3 A7 7 0 1 1 12.8 3.6" stroke-width="1.7" stroke-linecap="round"></path>
          <path d="M12.6 1.2 L12.8 3.9 L15.6 3.7" fill="none" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"></path>
        </svg>
      </button>
      <button class="railbtn" id="xrayBtn" title="X-Ray view" aria-label="X-Ray view">
        <svg class="bicon" viewBox="0 0 20 20" fill="currentColor">
          <rect x="5.5" y="8.7" width="9" height="2.6" rx="1.3"></rect>
          <circle cx="4.3" cy="7" r="2.3"></circle>
          <circle cx="4.3" cy="13" r="2.3"></circle>
          <circle cx="15.7" cy="7" r="2.3"></circle>
          <circle cx="15.7" cy="13" r="2.3"></circle>
        </svg>
      </button>
    </div>
    
  </main>
</div></div>
<div id="panels"></div>
</div>
<script>
"use strict";
var PRISTINE_HTML='';

const SEG=32;
function ringPt(r,a){return[r[1]+r[3]*Math.cos(a),r[0],r[2]+r[4]*Math.sin(a)];}
function breastBulge(y,angle,sex){
  if(sex!=='female') return 0;
  const maxBulge=3.3, angleHalfWidth=0.62, yHalfWidth=8.5, yCenter=133.5, angleCenter=0.70;
  let bulge=0;
  const centers=[Math.PI/2-angleCenter, Math.PI/2+angleCenter];
  for(let ci=0;ci<centers.length;ci++){
    let da=angle-centers[ci];
    while(da>Math.PI) da-=6.28318; while(da<-Math.PI) da+=6.28318;
    const dy=y-yCenter;
    if(Math.abs(da)<angleHalfWidth && Math.abs(dy)<yHalfWidth){
      const fa=Math.cos(1.5708*da/angleHalfWidth), fy=Math.cos(1.5708*dy/yHalfWidth);
      bulge+=maxBulge*fa*fa*fy*fy;
    }
  }
  return bulge;
}
function ringPtTorso(r,a,sex){
  const bulge=breastBulge(r[0],a,sex);

  return [r[1]+rx2*Math.cos(a), r[0], r[2]+rz2*Math.sin(a)];
}
function crLerp(p0,p1,p2,p3,t){

    const p0=rings[Math.max(0,i-1)],p1=rings[i],p2=rings[i+1],p3=rings[Math.min(n-1,i+2)];
    const steps=(i===n-2)?perSeg+1:perSeg;
    for(let s=0;s<steps;s++){
      const t=s/perSeg,row=[];
      for(let k=0;k<5;k++)row.push(crLerp(p0[k],p1[k],p2[k],p3[k],t));
      out.push(row);

function loft(rings,f,ptFn){ptFn=ptFn||ringPt;for(let i=0;i<rings.length-1;i++)for(let s=0;s<SEG;s++){const a0=s/SEG*6.28318,a1=(s+1)/SEG*6.28318;f.push([ptFn(rings[i],a0),ptFn(rings[i],a1),ptFn(rings[i+1],a1),ptFn(rings[i+1],a0)]);}}

// Proportions calibrated from a reference male/female body-outline diagram:
// measured shoulder/waist/hip widths on the actual outlines and matched these ratios.
//   MALE:   waist/shoulder=0.58  hip/shoulder=0.68
//   FEMALE: shoulder=0.83x male-shoulder   waist/shoulder=0.81   hip/shoulder=0.85   thigh=1.27x male-thigh
function adjRing(r,sex){var y=r[0],cx=r[1],cz=r[2],rx=r[3],rz=r[4];
 if(sex==='female'){
   if(y===148){rx*=0.89;}                        // narrower shoulders than male
   else if(y===112){rx*=1.28;rz*=1.08;}           // waist — much gentler taper than a "wasp waist"
   else if(y===104){rx*=1.10;rz*=1.06;}           // hip
   else if(y===96){rx*=1.14;rz*=1.12;cz-=1.0;}
   else if(y===90){rx*=1.10;rz*=1.10;cz-=0.7;}
 } else {
   if(y===148){rx*=1.07;}                         // wider shoulders
   else if(y===112){rx*=1.10;}                    // waist — straighter than female, but not extreme
   else if(y===104){rx*=1.06;}                    // hip — narrow relative to shoulder
   else if(y===96){rx*=1.03;}
 }

function adjLegRing(r,sex){var y=r[0],cx=r[1],cz=r[2],rx=r[3],rz=r[4];
 if(sex==='female'){
   if(y===92){rx*=1.08;rz*=1.12;cz-=0.8;}
   else if(y===74){rx*=1.27;rz*=1.15;cz-=0.4;}    // broader thighs

 loft(torso,f,torsoPt);cap(torso[0],f,true);

function faceNormal(f){const a=f[0],b=f[1],c=f[2];const u=[b[0]-a[0],b[1]-a[1],b[2]-a[2]],w=[c[0]-a[0],c[1]-a[1],c[2]-a[2]];return[u[1]*w[2]-u[2]*w[1],u[2]*w[0]-u[0]*w[2],u[0]*w[1]-u[1]*w[0]];}

function eul(p,e){let x=p[0],y=p[1],z=p[2];let c=Math.cos(e[0]),s=Math.sin(e[0]);let y1=y*c-z*s,z1=y*s+z*c;y=y1;z=z1;c=Math.cos(e[1]);s=Math.sin(e[1]);let x1=x*c+z*s,z2=-x*s+z*c;x=x1;z=z2;c=Math.cos(e[2]);s=Math.sin(e[2]);let x2=x*c-y*s,y2=x*s+y*c;return[x2,y2,z];}
function organMesh(part){

  const tT=part.taperTop||0,tB=part.taperBot||0,bend=part.bend||0,flat=part.flattenZ==null?1:part.flattenZ;
  const orient=part.orient||[0,0,0],o=part.o||[0,0,0];
  const grid=[];
  for(let i=0;i<=LAT;i++){
    const v=i/LAT*Math.PI,sv=Math.sin(v),cv=Math.cos(v);const row=[];

      const u=j/LON*6.28318;let dx=sv*Math.cos(u),dy=cv,dz=sv*Math.sin(u);
      let disp=1;if(amp)disp+=amp*sv*(Math.sin(u*1.7+seed)+0.6*Math.sin(u*2.9+v*2.3+seed*1.7)+0.5*Math.sin(v*3.1+seed))*0.33;

    const n=faceNormal(f),ct=faceCtr(f);
    faces.push((n[0]*(ct[0]-rr[0])+n[1]*(ct[1]-rr[1])+n[2]*(ct[2]-rr[2]))<0?[f[0],f[3],f[2],f[1]]:f);

}
const PANC=[[-10.2,-1.0,-0.1,1.3,1.3],[-9.2,-0.8,0.1,2.4,2.1],[-7.6,0,0.7,3.1,2.6],[-5.9,0.4,0.9,2.8,2.4],[-4.3,0.7,1.3,2.0,1.9],[-2.0,1.0,1.5,2.3,2.0],[1.0,1.5,1.4,2.2,1.85],[4.0,2.0,1.1,1.9,1.65],[6.6,2.5,0.7,1.5,1.3],[8.9,3.0,0.3,1.05,1.0],[10.4,3.3,0,0.5,0.5]];
function phash(n){const x=Math.sin(n*127.1+13.7)*43758.5453;return x-Math.floor(x);}

function keyOf(v){return Math.round(v[0]*50)+"_"+Math.round(v[1]*50)+"_"+Math.round(v[2]*50);}
function smoothNormals(faces){
  var acc={};
  for(var i=0;i<faces.length;i++){var n=faceNormal(faces[i]);for(var k=0;k<faces[i].length;k++){var key=keyOf(faces[i][k]);if(!acc[key])acc[key]=[0,0,0];acc[key][0]+=n[0];acc[key][1]+=n[1];acc[key][2]+=n[2];}}
  var fn=new Array(faces.length);
  for(var i=0;i<faces.length;i++){var sx=0,sy=0,sz=0;for(var k=0;k<faces[i].length;k++){var a=acc[keyOf(faces[i][k])];sx+=a[0];sy+=a[1];sz+=a[2];}var l=Math.hypot(sx,sy,sz)||1;fn[i]=[sx/l,sy/l,sz/l];}
  return fn;
}
function h1(n){var x=Math.sin(n*12.9898)*43758.5453;return x-Math.floor(x);}
var VIEW=[0,0,1];
var HALF=(function(){var v=[LIGHT[0]+VIEW[0],LIGHT[1]+VIEW[1],LIGHT[2]+VIEW[2]];var m=Math.hypot(v[0],v[1],v[2]);return[v[0]/m,v[1]/m,v[2]/m];})();
function shadeFace(col,n,nz,seed){
  var nl=Math.hypot(n[0],n[1],n[2])||1;
  var ndl=(n[0]*LIGHT[0]+n[1]*LIGHT[1]+n[2]*LIGHT[2])/nl;
  var wrap=Math.max(0,ndl*0.65+0.35);
  var ndh=Math.max(0,(n[0]*HALF[0]+n[1]*HALF[1]+n[2]*HALF[2])/nl);
  var spec=Math.pow(ndh,26)*0.55;
  var fres=Math.pow(1-Math.min(1,Math.abs(nz)),3)*0.34;
  var l=0.34+0.66*wrap;
  var c=[col[0]*l,col[1]*l,col[2]*l];
  var rim=[Math.min(255,col[0]*1.25+40),Math.min(255,col[1]*1.05+30),Math.min(255,col[2]*1.05+30)];
  c=mix(c,rim,fres);
  c=mix(c,[255,250,244],spec);
  if(seed!=null){var m=(h1(seed)-0.5)*0.10;c=[c[0]*(1+m),c[1]*(1+m),c[2]*(1+m*0.6)];}
  return c;
}

function draw(){
  if(!W)return;
  const bg=ctx.createRadialGradient(W/2,H*0.42,10,W/2,H*0.5,Math.max(W,H)*0.7);
  bg.addColorStop(0,'#152033');bg.addColorStop(1,'#0b1119');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  const sc=baseScale(),dist=420;
  const proj=p=>{const f=dist/(dist-p[2]);return[W/2+p[0]*sc*f,H/2-(p[1]-CY)*sc*f,p[2],f];};
  const draws=[];
  // body
  const SKIN=[224,181,152];
  for(let i=0;i<BODY.length;i++){
    const face=BODY[i];
    const cam=face.map(p=>rotate(p,angX,angY));
    const n=rotate(BODY_FN[i],angX,angY);const nz=n[2];
    if(nz<=0.015)continue;
    const pts=cam.map(proj);let d=0;for(const p of pts)d+=p[2];d/=pts.length;
    if(XRAY){
      draws.push({d:d-0.3,t:'fx',pts});
    } else {
      const c=shadeFace(SKIN,n,nz,i*0.37);
      draws.push({d,t:'f',pts,col:c});
    }
  }
  // organs
  const organScreen={};
  for(const o of ORGANS){
    if(!visible(o))continue;
    for(let i=0;i<o._faces.length;i++){
      const f=o._faces[i];
      const cam=f.map(v=>rotate([v[0]+o.pos[0],v[1]+o.pos[1],v[2]+o.pos[2]],angX,angY));
      const n=rotate(o._fn[i],angX,angY);const nz=n[2];
      if(nz<=0.02)continue;
      const pts=cam.map(proj);let d=0;for(const p of pts)d+=p[2];d/=pts.length;
      if(XRAY)draws.push({d:d+0.15,t:'of',pts,col:shadeFace(COL[o.id],n,nz,i),hi:(selected===o.id||hoverId===o.id)});
    }
    // glow + hit
    const hs=[];
    let gx=0,gy=0,gd=0;
    for(const h of o.hit){const pr=proj(rotate([h.o[0]+o.pos[0],h.o[1]+o.pos[1],h.o[2]+o.pos[2]],angX,angY));hs.push({x:pr[0],y:pr[1],rx:h.r*sc*pr[3]*1.2,ry:h.r*sc*pr[3]*1.2,d:pr[2]});gx+=pr[0];gy+=pr[1];gd=Math.max(gd,pr[2]);}
    gx/=o.hit.length;gy/=o.hit.length;
    organScreen[o.id]=hs;
    if(selected===o.id||hoverId===o.id){const cc=proj(rotate([o._center[0]+o.pos[0],o._center[1]+o.pos[1],o._center[2]+o.pos[2]],angX,angY));draws.push({d:cc[2]-6,t:'glow',x:cc[0],y:cc[1],r:26*sc*0.12+18});}
  }
  draws.sort((p,q)=>p.d-q.d);
  for(const dr of draws){
    if(dr.t==='fx'){ctx.beginPath();ctx.moveTo(dr.pts[0][0],dr.pts[0][1]);for(let i=1;i<dr.pts.length;i++)ctx.lineTo(dr.pts[i][0],dr.pts[i][1]);ctx.closePath();ctx.fillStyle='rgba(190,175,160,0.16)';ctx.fill();}
    else if(dr.t==='f'){ctx.beginPath();ctx.moveTo(dr.pts[0][0],dr.pts[0][1]);for(let i=1;i<dr.pts.length;i++)ctx.lineTo(dr.pts[i][0],dr.pts[i][1]);ctx.closePath();ctx.fillStyle=css(dr.col);ctx.fill();}
    else if(dr.t==='glow'){const g=ctx.createRadialGradient(dr.x,dr.y,1,dr.x,dr.y,dr.r);g.addColorStop(0,'rgba(255,214,120,0.5)');g.addColorStop(1,'rgba(255,214,120,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(dr.x,dr.y,dr.r,0,6.2832);ctx.fill();}
    else{ctx.beginPath();ctx.moveTo(dr.pts[0][0],dr.pts[0][1]);for(let i=1;i<dr.pts.length;i++)ctx.lineTo(dr.pts[i][0],dr.pts[i][1]);ctx.closePath();ctx.fillStyle=css(dr.col);ctx.fill();ctx.strokeStyle=css(dr.col);ctx.lineWidth=0.4;ctx.stroke();}
  }
  var _glowNow=Date.now();
  for(var _pi=GLOW_PULSES.length-1;_pi>=0;_pi--){
    var _gp=GLOW_PULSES[_pi];
    var _age=(_glowNow-_gp.t0)/1000,_travelDur=0.65;
    if(_age>=_travelDur){
      var _existH=GLOW_HALOS.find(function(_h){return _h.id===_gp.toId;});
      if(_existH){_existH.t0=_glowNow;}else{GLOW_HALOS.push({id:_gp.toId,t0:_glowNow});}
      GLOW_PULSES.splice(_pi,1);continue;
    }
    var _fh=organScreen[_gp.fromId],_th=organScreen[_gp.toId];
    if(!_fh||!_fh.length||!_th||!_th.length){GLOW_PULSES.splice(_pi,1);continue;}
    var _fx=0,_fy=0,_fd=0;for(const _h of _fh){_fx+=_h.x;_fy+=_h.y;_fd=Math.max(_fd,_h.d);}_fx/=_fh.length;_fy/=_fh.length;
    var _tx=0,_ty=0,_td=0;for(const _h of _th){_tx+=_h.x;_ty+=_h.y;_td=Math.max(_td,_h.d);}_tx/=_th.length;_ty/=_th.length;
    var _frac=_age/_travelDur,_ease=_frac*_frac*(3-2*_frac);
    var _pulseR=Math.max(14,18*sc*0.12+10);
    // immediate bright flash at the SOURCE the instant the pulse starts, so there's always visible feedback at the origin
    if(_age<0.18){
      var _srcFade=1-(_age/0.18);
      const _sg=ctx.createRadialGradient(_fx,_fy,0,_fx,_fy,_pulseR*1.8);
      _sg.addColorStop(0,'rgba(255,250,210,'+(0.85*_srcFade)+')');_sg.addColorStop(1,'rgba(255,250,210,0)');
      ctx.fillStyle=_sg;ctx.beginPath();ctx.arc(_fx,_fy,_pulseR*1.8,0,6.2832);ctx.fill();
    }
    // trailing comet: a short fading tail behind the traveling pulse
    for(var _tr=3;_tr>=0;_tr--){
      var _trailFrac=Math.max(0,_frac-_tr*0.05);
      var _trailEase=_trailFrac*_trailFrac*(3-2*_trailFrac);
      var _txp=_fx+(_tx-_fx)*_trailEase,_typ=_fy+(_ty-_fy)*_trailEase;
      var _trailAlpha=(1-_tr/4)*0.9;
      const _tg=ctx.createRadialGradient(_txp,_typ,0,_txp,_typ,_pulseR*(1-_tr*0.16));
      _tg.addColorStop(0,'rgba(255,240,180,'+_trailAlpha+')');_tg.addColorStop(1,'rgba(255,240,180,0)');
      ctx.fillStyle=_tg;ctx.beginPath();ctx.arc(_txp,_typ,_pulseR*(1-_tr*0.16),0,6.2832);ctx.fill();
    }
  }
  for(var _hi=GLOW_HALOS.length-1;_hi>=0;_hi--){
    var _gh=GLOW_HALOS[_hi];
    var _age2=(_glowNow-_gh.t0)/1000,_haloDur=4.0;
    if(_age2>=_haloDur){GLOW_HALOS.splice(_hi,1);continue;}
    var _hs=organScreen[_gh.id];
    if(!_hs||!_hs.length){GLOW_HALOS.splice(_hi,1);continue;}
    var _hx=0,_hy=0;for(const _h of _hs){_hx+=_h.x;_hy+=_h.y;}_hx/=_hs.length;_hy/=_hs.length;
    var _pulse=0.75+0.25*Math.sin(_glowNow*0.006+_hi);
    var _fadeOut=_age2>_haloDur-1?(_haloDur-_age2):1;
    var _baseR=Math.max(26,30*sc*0.12+22);
    // bright impact flash right when the halo begins, then settle into the sustained pulse
    var _impact=_age2<0.25?(1-_age2/0.25):0;
    var _r=_baseR*_pulse*(1+_impact*0.9);
    const _hg=ctx.createRadialGradient(_hx,_hy,1,_hx,_hy,_r);
    _hg.addColorStop(0,'rgba(130,225,255,'+Math.min(1,(0.72+_impact*0.28)*_fadeOut)+')');
    _hg.addColorStop(0.55,'rgba(120,220,255,'+(0.4*_fadeOut)+')');
    _hg.addColorStop(1,'rgba(120,220,255,0)');
    ctx.fillStyle=_hg;ctx.beginPath();ctx.arc(_hx,_hy,_r,0,6.2832);ctx.fill();
    // crisp bright core so it reads clearly even on a small screen
    ctx.fillStyle='rgba(210,245,255,'+(0.85*_fadeOut)+')';
    ctx.beginPath();ctx.arc(_hx,_hy,Math.max(3,_baseR*0.14),0,6.2832);ctx.fill();
  }
  window._organScreen=organScreen;  window._organScreen=organScreen;
  if(selected){const o=ORGANS.find(x=>x.id===selected);const hs=organScreen[selected];if(o&&hs&&hs.length){let cx=0,cy=0;for(const h of hs){cx+=h.x;cy+=h.y;}cx/=hs.length;cy/=hs.length;ctx.font='600 13px system-ui,sans-serif';const label=o.name.split(' — ')[0].split(' (')[0];const w=ctx.measureText(label).width+18;ctx.fillStyle='rgba(10,16,26,.85)';ctx.strokeStyle='#5cc8d6';ctx.lineWidth=1;roundRect(ctx,cx-w/2,cy-42,w,22,6);ctx.fill();ctx.stroke();ctx.fillStyle='#e7edf5';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(label,cx,cy-31);ctx.textAlign='left';}}
}
function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}
var lastTickT=Date.now(), DT=1/60;
function tick(){
 var _now=Date.now(); DT=Math.min(0.25,Math.max(0,(_now-lastTickT)/1000)); lastTickT=_now;
 if(homeActive){
   var need=false;
   if(autoSpin&&!drag){angY+=0.36*DT;need=true;}
   if(!drag&&Math.abs(vel)>0.0002){angY+=vel*DT*60;vel*=Math.pow(0.94,DT*60);need=true;}
   if(need||GLOW_PULSES.length||GLOW_HALOS.length)draw();
 } else {
   glandAng+=0.72*DT;
   advanceGoi();
   if(!SUPABASE_IMAGES[activeTab]){var cv=document.getElementById('gc-'+activeTab);if(cv)renderGland(cv,activeTab,glandAng);}
   var px=document.getElementById('px-'+activeTab);if(px)drawParticles(px,activeTab);
   animateImage(activeTab);

   if(activeTab==='testes'){var spc=document.getElementById('sperm-cv');if(spc)drawSpermatogenesis(spc);}
   if(DEMO[activeTab])DEMO[activeTab]();
 }
 requestAnimationFrame(tick);
}
function pick(mx,my){const os=window._organScreen||{};let best=null,bd=-1e9;for(const id in os){for(const h of os[id]){const dx=(mx-h.x)/h.rx,dy=(my-h.y)/h.ry;if(dx*dx+dy*dy<=1&&h.d>bd){bd=h.d;best=id;}}}return best;}
function localXY(e){const r=view.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return[t.clientX-r.left,t.clientY-r.top];}
var longPressTimer=null,longPressFired=false,longPressId=null;
view.addEventListener('pointerdown',e=>{drag=true;moved=0;const a=localXY(e);lastX=a[0];lastY=a[1];vel=0;view.setPointerCapture(e.pointerId);longPressFired=false;const hitId=pick(a[0],a[1]);if(hitId){longPressId=hitId;longPressTimer=setTimeout(()=>{if(moved<6){longPressFired=true;showOrganCard(longPressId);triggerTargetGlow(longPressId);}},450);}});
view.addEventListener('pointermove',e=>{const a=localXY(e),x=a[0],y=a[1];if(drag){const dx=x-lastX,dy=y-lastY;moved+=Math.abs(dx)+Math.abs(dy);if(longPressTimer&&moved>=6){clearTimeout(longPressTimer);longPressTimer=null;}angY+=dx*0.008;angX+=dy*0.006;vel=dx*0.008;if(angX>0.78)angX=0.78;if(angX<-0.78)angX=-0.78;lastX=x;lastY=y;draw();}else{const id=pick(x,y);const tip=document.getElementById('tip');if(id!==hoverId){hoverId=id;draw();}if(id){const o=ORGANS.find(z=>z.id===id);tip.style.display='block';tip.style.left=x+'px';tip.style.top=y+'px';tip.textContent=o.name.split(' — ')[0].split(' (')[0];view.style.cursor='pointer';}else{tip.style.display='none';view.style.cursor='grab';}}});
function endDrag(e){if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}if(drag){drag=false;if(longPressFired){longPressFired=false;return;}if(moved<6){const a=localXY(e);const id=pick(a[0],a[1]);if(id)openGlandTab(id);}}}

function triggerTargetGlow(sourceId){
  var o=ORGANS.find(function(x){return x.id===sourceId;});
  if(!o||!o.targets)return;
  var now=Date.now();
  o.targets.forEach(function(t){
    if(t.sexReq&&t.sexReq!==sex)return;
    var to=ORGANS.find(function(x){return x.id===t.id;});
    if(!to||!visible(to))return;
    var existingPulse=GLOW_PULSES.find(function(p){return p.toId===t.id;});
    if(existingPulse){existingPulse.t0=now;existingPulse.fromId=sourceId;existingPulse.hormone=t.hormone;return;}
    var existingHalo=GLOW_HALOS.find(function(h){return h.id===t.id;});
    if(existingHalo){existingHalo.t0=now;return;}
    GLOW_PULSES.push({fromId:sourceId,toId:t.id,t0:now,hormone:t.hormone});
  });
}
var orgCardHideTimer=null;
function showOrganCard(id){
  var o=ORGANS.find(function(x){return x.id===id;});
  if(!o)return;
  var card=document.getElementById('orgCard');
  if(!card)return;
  var html='<div class="ocTitle">'+o.name+'</div>';
  if(o.origin){
    html+='<div class="ocSection">Target organ</div>';
    html+='<div class="ocList">Responds to <b>'+o.hormone+'</b><br>released by the <b>'+o.origin+'</b></div>';
  } else {
    var core=o.core||[], extra=o.extra||[];
    if(core.length){
      html+='<div class="ocSection">Hormones released here</div>';
      html+='<div class="ocList">'+core.join('<br>')+'</div>';
    }
    if(extra.length){
      html+='<div class="ocSection">Also released here</div>';
      html+='<div class="ocList ocExtra">'+extra.join('<br>')+'</div>';
      html+='<div class="ocNote">Extra info \u2014 beyond the core Class 10 syllabus.</div>';
    }
  }
  card.innerHTML=html;
  card.classList.add('show');
  if(orgCardHideTimer)clearTimeout(orgCardHideTimer);
  orgCardHideTimer=setTimeout(function(){card.classList.remove('show');},5000);
}

function loadImageRobust(img,url,onSuccess,onFail){
  img.onload=onSuccess;
  img.onerror=function(){
    if(typeof fetch!=='function'){onFail();return;}
    fetch(url).then(function(r){
      if(!r.ok)throw new Error('bad status '+r.status);
      return r.blob();
    }).then(function(blob){
      var objUrl=URL.createObjectURL(blob);
      img.onerror=onFail;
      img.onload=onSuccess;
      img.src=objUrl;
    }).catch(function(){onFail();});
  };
  img.src=url;
}

function setGauge(root,val,min,max,zones,unit){
  var bar=root.querySelector('.gbar'),valEl=root.querySelector('.gval');
  var pct=(val-min)/(max-min);if(pct<0)pct=0;if(pct>1)pct=1;
  var z=zones[zones.length-1];for(var i=0;i<zones.length;i++){if(val>=zones[i][0]&&val<zones[i][1]){z=zones[i];break;}}
  bar.style.width=(pct*100)+'%';bar.style.background=z[2];
  valEl.textContent=Math.round(val)+' '+unit+'  ('+z[3]+')';valEl.style.color=z[2];
}

function drawSpark(cv,hist,min,max){
  var rect=cv.getBoundingClientRect();var dpr=Math.min(2,window.devicePixelRatio||1);
  var w=Math.max(1,Math.round(rect.width)),h=Math.max(1,Math.round(rect.height));
  if(cv.width!==w*dpr||cv.height!==h*dpr){cv.width=w*dpr;cv.height=h*dpr;}
  var g=cv.getContext('2d');g.setTransform(dpr,0,0,dpr,0,0);g.clearRect(0,0,w,h);
  var y1=h-(72-min)/(max-min)*h,y2=h-(110-min)/(max-min)*h;
  g.fillStyle='rgba(95,206,143,0.14)';g.fillRect(0,y2,w,y1-y2);
  g.strokeStyle='#e6795a';g.lineWidth=2;g.beginPath();
  for(var i=0;i<hist.length;i++){var x=i/119*w,y=h-(hist[i]-min)/(max-min)*h;if(i===0)g.moveTo(x,y);else g.lineTo(x,y);}
  g.stroke();
}

    g.fillStyle=fg;g.beginPath();g.arc(fx,fy,r,0,6.2832);g.fill();
    g.strokeStyle='#f7d3e0';g.lineWidth=1.3;g.beginPath();g.arc(fx,fy,r,0,6.2832);g.stroke();
    if(eggR>0){
      var ex=fx+r*0.32*eggOff, ey=fy+r*0.30;
      var eg=g.createRadialGradient(ex-eggR*0.3,ey-eggR*0.3,eggR*0.1,ex,ey,eggR);
      eg.addColorStop(0,'#fff6f3');eg.addColorStop(0.7,'#f3c9cf');eg.addColorStop(1,'#d98fa0');
      g.fillStyle=eg;g.beginPath();g.arc(ex,ey,eggR,0,6.2832);g.fill();
      g.strokeStyle='#ffffff';g.lineWidth=0.9;g.beginPath();g.arc(ex,ey,eggR,0,6.2832);g.stroke();
      return [ex,ey];
    }
    return [fx,fy];
  }

  function drawEgg(px,py,alpha){
    var eg=g.createRadialGradient(px-3,py-3,1,px,py,4.6);
    eg.addColorStop(0,'#fff6f3');eg.addColorStop(0.7,'#f3c9cf');eg.addColorStop(1,'#d98fa0');
    g.globalAlpha=alpha;g.fillStyle=eg;g.beginPath();g.arc(px,py,4.4,0,6.2832);g.fill();
    g.strokeStyle='rgba(255,255,255,.8)';g.lineWidth=1;g.beginPath();g.arc(px,py,4.4,0,6.2832);g.stroke();
    g.globalAlpha=1;
  }

  if(OV.phase==='idle'){
    g.fillStyle='rgba(122,74,82,.6)';g.beginPath();g.arc(fx,fy,4,0,6.2832);g.fill();
    return;
  }
  if(OV.phase==='growing'){
    var p=Math.min(1,t/GROW), ease=1-Math.pow(1-p,2);
    var r=4+ease*17;
    follicleFluid(r, 2+ease*2.6, 1);
    if(p>=1){OV.phase='rupture';OV.t0=Date.now();}
  } else if(OV.phase==='rupture'){
    var p2=Math.min(1,t/BURST);
    var r=21*(1-p2*0.35);
    follicleFluid(r, 4.6*(1-p2*0.2), 1);
    g.globalAlpha=1;
    for(var k=0;k<10;k++){
      var a=k/10*6.2832+0.3;
      var rr=r*0.9+p2*(16+6*Math.sin(k*2.1));
      var dropR=(1.6+1.4*Math.sin(k*1.7))*(1-p2*0.4);
      g.fillStyle='rgba(247,211,224,'+(0.85*(1-p2))+')';
      g.beginPath();g.arc(fx+Math.cos(a)*rr,fy+Math.sin(a)*rr,Math.max(0.4,dropR),0,6.2832);g.fill();
    }
    if(p2<0.5){g.fillStyle='rgba(255,255,255,'+(0.5*(1-p2*2))+')';g.beginPath();g.arc(fx,fy,r*1.15,0,6.2832);g.fill();}
    if(p2>=1){OV.phase='released';OV.t0=Date.now();}
  } else if(OV.phase==='released'){
    var p3=Math.min(1,t/TRAVEL);
    var APPROACH=0.20; // fraction of travel spent reaching the funnel mouth before entering the tube
    var mouthPt=TB.point(0);
    if(p3<APPROACH){
      var pa=p3/APPROACH, easeA=1-Math.pow(1-pa,2);
      var px=fx+(mouthPt[0]-fx)*easeA, py=fy+(mouthPt[1]-fy)*easeA;
      drawEgg(px,py,1);
    } else {
      var pb=(p3-APPROACH)/(1-APPROACH);
      var easeB=pb<0.5?2*pb*pb:1-Math.pow(-2*pb+2,2)/2;
      var pos=TB.point(easeB), tg=TB.tangent(easeB), perp=[-tg[1],tg[0]];
      var hw=TB.halfWidth(easeB);
      var wob=Math.sin(t*9)*Math.min(1,hw*0.35)*(1-pb*0.5);
      var px2=pos[0]+perp[0]*wob, py2=pos[1]+perp[1]*wob;
      drawEgg(px2,py2,1-pb*0.08);
      var capEl=document.getElementById('ovCap');
      if(capEl && capEl.dataset.stage!=='3'){capEl.dataset.stage='3';capEl.innerHTML='3 \u2014 The <b>fimbriae</b> sweep the egg into the fallopian tube, where it may be fertilised.';}
    }
    if(p3>=1){OV.phase='done';var pb2=document.getElementById('ovPlay');if(pb2)pb2.disabled=false;}
  }
}
function runOvulation(){
  if(OV.phase==='growing'||OV.phase==='rupture'||OV.phase==='released')return;
  var pb=document.getElementById('ovPlay');if(pb)pb.disabled=true;
  var cap=document.getElementById('ovCap');
  if(cap){cap.dataset.stage='1';cap.innerHTML='1 \u2014 Rising <b>estrogen</b> matures a follicle inside the ovary.';}
  OV.phase='growing';OV.t0=Date.now();
  setTimeout(function(){if(cap && OV.phase==='rupture'){cap.dataset.stage='2';cap.innerHTML='2 \u2014 The mature follicle <b>ruptures</b> \u2014 this release is called <b>ovulation</b>.';}},1450);
}
function renderGland(cv,id,ang){
  var o=ORGANS.find(function(x){return x.id===id;});if(!o)return;
  var rect=cv.getBoundingClientRect();var dpr=Math.min(2,window.devicePixelRatio||1);
  var w=Math.max(1,Math.round(rect.width)),h=Math.max(1,Math.round(rect.height));
  if(cv.width!==w*dpr||cv.height!==h*dpr){cv.width=w*dpr;cv.height=h*dpr;}
  var g=cv.getContext('2d');g.setTransform(dpr,0,0,dpr,0,0);g.clearRect(0,0,w,h);
  var mx=0;for(var a=0;a<o._faces.length;a++)for(var b=0;b<o._faces[a].length;b++){var v=o._faces[a][b],dx=v[0]-o._center[0],dy=v[1]-o._center[1],dz=v[2]-o._center[2];var m=Math.hypot(dx,dy,dz);if(m>mx)mx=m;}
  var S=Math.min(w,h)*0.40/mx,dist=420,draws=[];
  var sq=(id==='uterus')?uterusSqueeze():0;
  if(id==='uterus')ACT.uterus=0.2+0.8*sq;
  var us=1;if(id==='thyroid'){us=1+GOI*0.55;}
  for(var i=0;i<o._faces.length;i++){var f=o._faces[i];
    var cam=f.map(function(v){var vx=(v[0]-o._center[0])*us,vy=(v[1]-o._center[1])*us,vz=(v[2]-o._center[2])*us;if(sq){vx*=(1-0.22*sq);vz*=(1-0.22*sq);vy*=(1+0.06*sq);}return rotate([vx,vy,vz],0.2,ang);});
    var n=rotate(o._fn[i],0.2,ang);var nz=n[2];if(nz<=0.02)continue;
    var pr=cam.map(function(p){var f2=dist/(dist-p[2]*S);return[w/2+p[0]*S*f2,h/2-p[1]*S*f2];});
    var d=0;cam.forEach(function(p){d+=p[2];});d/=cam.length;draws.push({d:d,pr:pr,c:css(shadeFace(COL[o.id],n,nz,i))});
  }
  draws.sort(function(a,b){return a.d-b.d;});
  for(var k=0;k<draws.length;k++){var dr=draws[k];g.beginPath();g.moveTo(dr.pr[0][0],dr.pr[0][1]);for(var q=1;q<dr.pr.length;q++)g.lineTo(dr.pr[q][0],dr.pr[q][1]);g.closePath();g.fillStyle=dr.c;g.fill();g.strokeStyle=dr.c;g.lineWidth=0.4;g.stroke();}
}
